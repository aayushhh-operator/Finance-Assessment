[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    auth: Authentication tests
    permissions: Role-based access control tests
    transactions: Transaction CRUD tests
    dashboard: Dashboard endpoint tests
    validation: Input validation tests
    business_rules: Business logic tests
    rate_limiting: Rate limiting tests
    slow: Slow-running tests
